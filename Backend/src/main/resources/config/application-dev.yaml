logging:
  level:
    ROOT: INFO
    com.luvina.la: DEBUG
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring:
  datasource:
    # jdbc properties to connect to database
    # createDatabaseIfNotExist=true: tự tạo database nếu không tồn tại
    jdbcUrl: jdbc:mysql://localhost:3306/user-manage?createDatabaseIfNotExist=true
    username: root
    password: LA.luvina1234
    isAutoCommit: false
    connectionTimeout: 10000
    maximumPoolSize: 20
    leakDetectionThreshold: 64800
    poolName: spring-boot-hikari-mysql-cp
    maxLifetime: 72000
    data-source-properties:
      cachePrepStmts: true
      prepStmtCacheSize: 250
      prepStmtCacheSqlLimit: 2048
      useServerPrepStmts: true
      useLocalSessionState: true
      rewriteBatchedStatements: true
      cacheResultSetMetadata: true
      cacheServerConfiguration: true
      elideSetAutoCommits: true
      maintainTimeStats: false
  
  jpa:
    hibernate:
      # validate: kiểm tra schema có hợp lệ không (Flyway sẽ tạo bảng từ migration)
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        show_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 200
        order_inserts: true
        order_updates: true

  # Flyway configuration
  # Flyway sẽ chạy các migration tự động khi ứng dụng khởi động
  flyway:
    validateOnMigrate: false
    repair: true
    baselineOnMigrate: true
    baselineVersion: 1
    locations: classpath:db/migration
    enabled: true

management:
    endpoint.metrics.enabled: true
    endpoints.web.exposure.include: metrics
